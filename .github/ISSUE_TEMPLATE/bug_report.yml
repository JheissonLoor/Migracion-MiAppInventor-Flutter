name: Bug operativo
about: Reportar error funcional o regresion frente al flujo MIT
labels: bug, needs-triage
body:
  - type: textarea
    id: resumen
    attributes:
      label: Resumen
      description: Que ocurrio y en que modulo.
      placeholder: Ejemplo: Consulta Stock no reconoce QR de 19 campos.
    validations:
      required: true
  - type: dropdown
    id: modulo
    attributes:
      label: Modulo
      options:
        - Login
        - Consulta Stock PCP
        - Salida de Almacen
        - Reingreso de Almacen
        - Gestion Stock Telas
        - Ingreso Telas
        - Impresion local
        - Produccion
        - Historiales
        - Usuarios / Proveedores
        - Otro
    validations:
      required: true
  - type: textarea
    id: pasos
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Abrir pantalla...
        2. Escanear QR...
        3. Presionar...
    validations:
      required: true
  - type: textarea
    id: esperado
    attributes:
      label: Resultado esperado
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Resultado actual
    validations:
      required: true
  - type: textarea
    id: evidencia
    attributes:
      label: Evidencia
      description: Capturas, logs, QR de prueba anonimizado o respuesta del backend.
  - type: checkboxes
    id: seguridad
    attributes:
      label: Seguridad
      options:
        - label: No adjunte credenciales, tokens ni datos sensibles reales.
          required: true
