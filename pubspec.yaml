name: coolimport_pcp
description: "Sistema de Gestión Textil - CoolImport S.A.C."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # === Íconos ===
  cupertino_icons: ^1.0.8

  # === Estado (Riverpod) ===
  flutter_riverpod: ^2.6.1

  # === Networking ===
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.5
  gsheets: ^0.5.0

  # === Almacenamiento local (reemplaza TinyDB) ===
  shared_preferences: ^2.5.3

  # === Generacion local de imagen QR para impresion ===
  qr_flutter: ^4.1.0

  # === Escaneo QR por camara (tablet Android) ===
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/config/
