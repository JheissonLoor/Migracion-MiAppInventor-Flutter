        <text x="18" y="28" fill="#bae6fd" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Flask</text>
        <rect x="104" y="0" width="84" height="44" rx="12" fill="#082f49" stroke="#38bdf8" stroke-opacity="0.3"/>
        <text x="120" y="28" fill="#bae6fd" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Sheets</text>
        <rect x="208" y="0" width="86" height="44" rx="12" fill="#082f49" stroke="#38bdf8" stroke-opacity="0.3"/>
        <text x="222" y="28" fill="#bae6fd" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Local API</text>
      </g>
    </g>
  </g>

  <text x="76" y="488" fill="#7dd3fc" fill-opacity="0.88" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">Production-minded migration case study</text>
  <text x="1030" y="488" fill="#cbd5e1" fill-opacity="0.72" font-family="Segoe UI, Arial, sans-serif" font-size="15">Flutter · Python · Flask · Google Sheets · Supabase · QR</text>
