      <circle cx="20" cy="17" r="6" fill="#22c55e"/>
      <text x="40" y="22" fill="#e0f2fe" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Flutter tablet client</text>

      <path d="M34 58 H260" stroke="url(#cyan)" stroke-width="4" stroke-linecap="round"/>
      <path d="M34 94 H210" stroke="#38bdf8" stroke-opacity="0.52" stroke-width="4" stroke-linecap="round"/>
      <path d="M34 130 H240" stroke="#2dd4bf" stroke-opacity="0.5" stroke-width="4" stroke-linecap="round"/>

