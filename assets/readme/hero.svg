<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CoolImport PCP - Migracion industrial Flutter</title>
  <desc id="desc">Banner tecnico del sistema CoolImport PCP, una migracion industrial de MIT App Inventor a Flutter Android.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.48" stop-color="#0d2442"/>
      <stop offset="1" stop-color="#092f3f"/>
    </linearGradient>
    <linearGradient id="cyan" x1="80" y1="80" x2="1180" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#122641" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#071827" stop-opacity="0.94"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.08 0 0 0 0 0.74 0 0 0 0 0.86 0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" stroke="#2dd4bf" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#67e8f9" fill-opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="1280" height="520" rx="34" fill="url(#bg)"/>
  <rect width="1280" height="520" rx="34" fill="url(#grid)"/>
  <rect width="1280" height="520" rx="34" fill="url(#dots)"/>

  <circle cx="1090" cy="95" r="170" fill="#0891b2" fill-opacity="0.18" filter="url(#glow)"/>
  <circle cx="168" cy="410" r="210" fill="#2563eb" fill-opacity="0.18" filter="url(#glow)"/>
  <path d="M0 380 C180 310 250 455 430 370 C620 280 690 140 860 210 C1010 270 1110 205 1280 120 V520 H0 V380Z" fill="#0ea5e9" fill-opacity="0.08"/>

