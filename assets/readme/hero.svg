      <text x="18" y="47" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">6/8/14/16/19</text>

      <rect x="188" y="0" width="168" height="62" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.26"/>
      <text x="206" y="25" fill="#67e8f9" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Resiliencia</text>
      <text x="206" y="47" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Offline queues</text>

      <rect x="376" y="0" width="190" height="62" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.26"/>
      <text x="394" y="25" fill="#67e8f9" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Hardware</text>
      <text x="394" y="47" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Zebra / Epson</text>
    </g>
  </g>

  <g transform="translate(780 110)">
    <rect x="0" y="0" width="398" height="286" rx="30" fill="#061827" fill-opacity="0.88" stroke="#38bdf8" stroke-opacity="0.25"/>
    <rect x="28" y="28" width="342" height="230" rx="22" fill="#0b2239" stroke="#1e3a5f"/>

