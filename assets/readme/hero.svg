    <path d="M902 92 L966 56 L1030 92 V165 L966 202 L902 165 V92Z" stroke="#38bdf8" stroke-opacity="0.36" stroke-width="2"/>
    <path d="M1028 182 L1092 146 L1156 182 V255 L1092 292 L1028 255 V182Z" stroke="#2dd4bf" stroke-opacity="0.28" stroke-width="2"/>
    <path d="M820 230 L884 194 L948 230 V303 L884 340 L820 303 V230Z" stroke="#38bdf8" stroke-opacity="0.26" stroke-width="2"/>
  </g>

  <g transform="translate(76 74)">
    <rect x="0" y="0" width="640" height="372" rx="30" fill="url(#card)" stroke="#2dd4bf" stroke-opacity="0.22"/>
    <rect x="28" y="28" width="156" height="38" rx="19" fill="#082f49" stroke="#38bdf8" stroke-opacity="0.35"/>
    <text x="46" y="53" fill="#7dd3fc" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="2.4">LEGACY SAFE</text>

